model_list:
  # Map the model requested by the Agent to the actual Ollama model
  - model_name: qwen3-8b
    litellm_params:
      model: ollama/qwen2.5:7b # (Adjust this tag to match the exact model you pull in Ollama)
      # Route requests using the internal Docker network hostname
      api_base: http://ollama:11434

  - model_name: glm4
    litellm_params:
      model: ollama/glm4
      api_base: http://ollama:11434

litellm_settings:
  set_verbose: false
  drop_params: true # Important for dropping unsupported OpenAI parameters before hitting Ollama
