services:
  gateway:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    ports:
      - "8000:8000"  # API Server (If enabled)
    volumes:
      - ./data:/opt/data
      - /var/run/docker.sock:/var/run/docker.sock  # Required if TERMINAL_ENV=docker
    env_file:
      - .env
    environment:
      - HERMES_UID=1000
      - HERMES_GID=1000
    command: ["gateway", "run"]

  dashboard:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    depends_on:
      - gateway
    ports:
      - "9119:9119"  # Dashboard Web UI
    volumes:
      - ./data:/opt/data
    env_file:
      - .env
    environment:
      - HERMES_UID=1000
      - HERMES_GID=1000
    command: ["dashboard", "--host", "0.0.0.0", "--no-open"]
