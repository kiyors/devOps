services:
  # ==========================================
  # HERMES CORE (The Brain/Gateway)
  # ==========================================
  gateway:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    ports:
      - "8000:8000"  # API Server (If enabled)
    volumes:
      - ./data:/opt/data # Persists the agent's memory, skills, and trajectories
      # CRITICAL: This allows the agent to spin up secure, ephemeral Docker containers
      # to execute Python/NodeJS code on the fly without breaking out into the host OS.
      - /var/run/docker.sock:/var/run/docker.sock  # Required if TERMINAL_ENV=docker
    env_file:
      - .env
    environment:
      - HERMES_UID=1000
      - HERMES_GID=1000
    command: ["gateway", "run"]

  # ==========================================
  # HERMES WEB UI (The Dashboard)
  # ==========================================
  dashboard:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    depends_on:
      - gateway
    volumes:
      - ./data:/opt/data
    env_file:
      - .env
    environment:
      - HERMES_UID=1000
      - HERMES_GID=1000
    command: ["dashboard", "--host", "0.0.0.0", "--no-open"]
    networks:
      - default
      - proxy_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hermes.rule=Host(`${DASHBOARD_DOMAIN:-hermes.local}`)"
      - "traefik.http.services.hermes.loadbalancer.server.port=9119"

networks:
  proxy_net:
    name: global_proxy_net
    external: true
