name: huly-selfhost
services:
  nginx:
    image: "nginx:1.21.3"
    command: >
      /bin/sh -c 'cat <<EOF > /etc/nginx/conf.d/default.conf
      server {
          listen 80;
          server_name _;
          client_max_body_size 100M;

          location / {
              proxy_set_header Host \$$host;
              proxy_set_header X-Real-IP \$$remote_addr;
              proxy_set_header X-Forwarded-For \$$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto \$$scheme;
              proxy_pass http://front:8080;
          }

          location /_accounts {
              proxy_set_header Host \$$host;
              proxy_set_header X-Real-IP \$$remote_addr;
              proxy_set_header X-Forwarded-For \$$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto \$$scheme;

              rewrite ^/_accounts(/.*)\$$ \$$1 break;
              proxy_pass http://account:3000/;
          }

          location /_collaborator {
              proxy_set_header Host \$$host;
              proxy_set_header X-Real-IP \$$remote_addr;
              proxy_set_header X-Forwarded-For \$$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto \$$scheme;

              proxy_http_version 1.1;
              proxy_set_header Upgrade \$$http_upgrade;
              proxy_set_header Connection "upgrade";
              rewrite ^/_collaborator(/.*)\$$ \$$1 break;
              proxy_pass http://collaborator:3078/;
          }

          location /_transactor {
              proxy_set_header Host \$$host;
              proxy_set_header X-Real-IP \$$remote_addr;
              proxy_set_header X-Forwarded-For \$$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto \$$scheme;

              proxy_http_version 1.1;
              proxy_set_header Upgrade \$$http_upgrade;
              proxy_set_header Connection "upgrade";
              rewrite ^/_transactor(/.*)\$$ \$$1 break;
              proxy_pass http://transactor:3333/;
          }

          location ~ ^/eyJ {
              proxy_set_header Host \$$host;
              proxy_set_header X-Real-IP \$$remote_addr;
              proxy_set_header X-Forwarded-For \$$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto \$$scheme;

              proxy_http_version 1.1;
              proxy_set_header Upgrade \$$http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_pass http://transactor:3333;
          }

          location /_rekoni {
              proxy_set_header Host \$$host;
              proxy_set_header X-Real-IP \$$remote_addr;
              proxy_set_header X-Forwarded-For \$$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto \$$scheme;

              rewrite ^/_rekoni(/.*)\$$ \$$1 break;
              proxy_pass http://rekoni:4004/;
          }

          location /_stats {
              proxy_set_header Host \$$host;
              proxy_set_header X-Real-IP \$$remote_addr;
              proxy_set_header X-Forwarded-For \$$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto \$$scheme;

              rewrite ^/_stats(/.*)\$$ \$$1 break;
              proxy_pass http://stats:4900/;
          }
      }
      EOF
      nginx -g "daemon off;"'
    restart: unless-stopped
    networks:
      - huly_net
      - proxy_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.huly.rule=Host(`${FRONT_DOMAIN:-huly.local}`)"
      - "traefik.http.services.huly.loadbalancer.server.port=80"

  cockroach:
    image: cockroachdb/cockroach:latest-v24.2
    command: start-single-node --accept-sql-without-tls
    environment:
      - COCKROACH_DATABASE=${CR_DATABASE:-defaultdb}
      - COCKROACH_USER=${CR_USERNAME:-selfhost}
      - COCKROACH_PASSWORD=${CR_USER_PASSWORD:-cockroachsecret}
    volumes:
      - cr_data:/cockroach/cockroach-data
      - cr_certs:/cockroach/certs
    restart: unless-stopped
    networks:
      - huly_net

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.6
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=info
    volumes:
      - redpanda:/var/lib/redpanda/data
    environment:
      - REDPANDA_SUPERUSER_USERNAME=${REDPANDA_ADMIN_USER:-superadmin}
      - REDPANDA_SUPERUSER_PASSWORD=${REDPANDA_ADMIN_PWD:-redpandasecret}
    healthcheck:
      test:
        [
          "CMD",
          "rpk",
          "cluster",
          "info",
          "-X",
          "user=${REDPANDA_ADMIN_USER:-superadmin}",
          "-X",
          "pass=${REDPANDA_ADMIN_PWD:-redpandasecret}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - huly_net

  minio:
    image: "minio/minio"
    command: server /data --address ":9000" --console-address ":9001"
    volumes:
      - files:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - huly_net

  elastic:
    image: "elasticsearch:7.14.2"
    command: |
      /bin/sh -c "./bin/elasticsearch-plugin list | grep -q ingest-attachment || yes | ./bin/elasticsearch-plugin install --silent ingest-attachment;
      /usr/local/bin/docker-entrypoint.sh eswrapper"
    volumes:
      - elastic:/usr/share/elasticsearch/data
    environment:
      - ELASTICSEARCH_PORT_NUMBER=9200
      - BITNAMI_DEBUG=true
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1024m -Xmx1024m
      - http.cors.enabled=true
      - http.cors.allow-origin=http://localhost:8082
    healthcheck:
      interval: 20s
      retries: 10
      test: curl -s http://localhost:9200/_cluster/health | grep -vq '"status":"red"'
    restart: unless-stopped
    networks:
      - huly_net

  rekoni:
    image: hardcoreeng/rekoni-service:${HULY_VERSION:-v0.7.423}
    environment:
      - SECRET=${SECRET:-generate_a_secure_random_secret_here}
    deploy:
      resources:
        limits:
          memory: 500M
    restart: unless-stopped
    networks:
      - huly_net

  transactor:
    image: hardcoreeng/transactor:${HULY_VERSION:-v0.7.423}
    environment:
      - SERVER_PORT=3333
      - SERVER_SECRET=${SECRET:-generate_a_secure_random_secret_here}
      - DB_URL=postgres://${CR_USERNAME:-selfhost}:${CR_USER_PASSWORD:-cockroachsecret}@cockroach:26257/${CR_DATABASE:-defaultdb}
      - STORAGE_CONFIG=minio|minio?accessKey=minioadmin&secretKey=minioadmin
      - FRONT_URL=${FRONT_URL:-http://localhost}
      - ACCOUNTS_URL=http://account:3000
      - FULLTEXT_URL=http://fulltext:4700
      - STATS_URL=http://stats:4900
      - LAST_NAME_FIRST=${LAST_NAME_FIRST:-true}
      - QUEUE_CONFIG=redpanda:9092
    restart: unless-stopped
    networks:
      - huly_net

  collaborator:
    image: hardcoreeng/collaborator:${HULY_VERSION:-v0.7.423}
    environment:
      - COLLABORATOR_PORT=3078
      - SECRET=${SECRET:-generate_a_secure_random_secret_here}
      - ACCOUNTS_URL=http://account:3000
      - STATS_URL=http://stats:4900
      - STORAGE_CONFIG=minio|minio?accessKey=minioadmin&secretKey=minioadmin
    restart: unless-stopped
    networks:
      - huly_net

  account:
    image: hardcoreeng/account:${HULY_VERSION:-v0.7.423}
    environment:
      - SERVER_PORT=3000
      - SERVER_SECRET=${SECRET:-generate_a_secure_random_secret_here}
      - DB_URL=postgres://${CR_USERNAME:-selfhost}:${CR_USER_PASSWORD:-cockroachsecret}@cockroach:26257/${CR_DATABASE:-defaultdb}
      - TRANSACTOR_URL=ws://transactor:3333;${FRONT_URL:-http://localhost}/_transactor
      - STORAGE_CONFIG=minio|minio?accessKey=minioadmin&secretKey=minioadmin
      - FRONT_URL=${FRONT_URL:-http://localhost}
      - STATS_URL=${FRONT_URL:-http://localhost}/_stats
      - MODEL_ENABLED=*
      - ACCOUNTS_URL=${FRONT_URL:-http://localhost}/_accounts
      - ACCOUNT_PORT=3000
      - QUEUE_CONFIG=redpanda:9092
    restart: unless-stopped
    networks:
      - huly_net

  workspace:
    image: hardcoreeng/workspace:${HULY_VERSION:-v0.7.423}
    environment:
      - SERVER_SECRET=${SECRET:-generate_a_secure_random_secret_here}
      - DB_URL=postgres://${CR_USERNAME:-selfhost}:${CR_USER_PASSWORD:-cockroachsecret}@cockroach:26257/${CR_DATABASE:-defaultdb}
      - TRANSACTOR_URL=ws://transactor:3333;${FRONT_URL:-http://localhost}/_transactor
      - STORAGE_CONFIG=minio|minio?accessKey=minioadmin&secretKey=minioadmin
      - MODEL_ENABLED=*
      - ACCOUNTS_URL=http://account:3000
      - STATS_URL=http://stats:4900
      - QUEUE_CONFIG=redpanda:9092
      - ACCOUNTS_DB_URL=postgres://${CR_USERNAME:-selfhost}:${CR_USER_PASSWORD:-cockroachsecret}@cockroach:26257/${CR_DATABASE:-defaultdb}
    restart: unless-stopped
    networks:
      - huly_net

  front:
    image: hardcoreeng/front:${HULY_VERSION:-v0.7.423}
    environment:
      - SERVER_PORT=8080
      - SERVER_SECRET=${SECRET:-generate_a_secure_random_secret_here}
      - LOVE_ENDPOINT=${FRONT_URL:-http://localhost}/_love
      - ACCOUNTS_URL=${FRONT_URL:-http://localhost}/_accounts
      - ACCOUNTS_URL_INTERNAL=http://account:3000
      - REKONI_URL=${FRONT_URL:-http://localhost}/_rekoni
      - CALENDAR_URL=${FRONT_URL:-http://localhost}/_calendar
      - GMAIL_URL=${FRONT_URL:-http://localhost}/_gmail
      - TELEGRAM_URL=${FRONT_URL:-http://localhost}/_telegram
      - STATS_URL=${FRONT_URL:-http://localhost}/_stats
      - UPLOAD_URL=/files
      - ELASTIC_URL=http://elastic:9200
      - COLLABORATOR_URL=${FRONT_URL:-http://localhost}/_collaborator
      - STORAGE_CONFIG=minio|minio?accessKey=minioadmin&secretKey=minioadmin
      - TITLE=${TITLE:-Huly Self Host}
      - DEFAULT_LANGUAGE=${DEFAULT_LANGUAGE:-en}
      - LAST_NAME_FIRST=${LAST_NAME_FIRST:-true}
      - DESKTOP_UPDATES_CHANNEL=${DESKTOP_CHANNEL:-0.7.423}
      - DISABLED_FEATURES=auto-translate,mailboxes
    restart: unless-stopped
    networks:
      - huly_net

  fulltext:
    image: hardcoreeng/fulltext:${HULY_VERSION:-v0.7.423}
    environment:
      - SERVER_SECRET=${SECRET:-generate_a_secure_random_secret_here}
      - DB_URL=postgres://${CR_USERNAME:-selfhost}:${CR_USER_PASSWORD:-cockroachsecret}@cockroach:26257/${CR_DATABASE:-defaultdb}
      - FULLTEXT_DB_URL=http://elastic:9200
      - ELASTIC_INDEX_NAME=huly_storage_index
      - STORAGE_CONFIG=minio|minio?accessKey=minioadmin&secretKey=minioadmin
      - REKONI_URL=http://rekoni:4004
      - ACCOUNTS_URL=http://account:3000
      - STATS_URL=http://stats:4900
      - QUEUE_CONFIG=redpanda:9092
    restart: unless-stopped
    networks:
      - huly_net

  stats:
    image: hardcoreeng/stats:${HULY_VERSION:-v0.7.423}
    environment:
      - PORT=4900
      - SERVER_SECRET=${SECRET:-generate_a_secure_random_secret_here}
    restart: unless-stopped
    networks:
      - huly_net

  kvs:
    image: hardcoreeng/hulykvs:${HULY_VERSION:-v0.7.423}
    depends_on:
      cockroach:
        condition: service_started
    ports:
      - "8094:8094"
    environment:
      - HULY_DB_CONNECTION=postgres://${CR_USERNAME:-selfhost}:${CR_USER_PASSWORD:-cockroachsecret}@cockroach:26257/${CR_DATABASE:-defaultdb}
      - HULY_TOKEN_SECRET=${SECRET:-generate_a_secure_random_secret_here}
    restart: unless-stopped
    networks:
      - huly_net

volumes:
  elastic:
  files:
  cr_data:
  cr_certs:
  redpanda:

networks:
  huly_net:
  proxy_net:
    name: global_proxy_net
    external: true
